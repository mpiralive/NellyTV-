<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NellyTV</title>
<style>
    body { background: #0b111e; color: white; font-family: sans-serif; padding: 20px; }
    .match-card { background: #131c2e; padding: 15px; margin-bottom: 10px; border-radius: 10px; border-left: 4px solid #00a86b; }
    h2 { color: #f4a228; }
</style>
</head>
<body>

<h2>Mechi za Live Leo</h2>
<div id="matchesList">Inatafuta mechi...</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBOYv4r1HBdmiTi lZIchXQ_w",
    authDomain: "nellytv-86294.firebaseapp.com",
    projectId: "nellytv-86294",
    databaseURL: "https://nellytv-86294-default-rtdb.firebaseio.com",
    storageBucket: "nellytv-86294.appspot.com",
    messagingSenderId: "878074217893",
    appId: "1:878074217893:web:a68721b581e6"
  };

  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);

  const matchesRef = ref(database, 'matches');
  onValue(matchesRef, (snapshot) => {
    const list = document.getElementById('matchesList');
    list.innerHTML = ""; 
    
    if(snapshot.exists()) {
        snapshot.forEach((child) => {
            const match = child.val();
            list.innerHTML += `<div class="match-card">
                <h3>${match.name}</h3>
                <p>Link: ${match.link}</p>
            </div>`;
        });
    } else {
        list.innerHTML = "Hakuna mechi kwa sasa.";
    }
  });
</script>
</body>
</html>
