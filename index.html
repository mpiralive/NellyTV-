<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NellyTV</title>
    <style>
        body { background: #0b111e; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .header { font-weight: bold; font-size: 24px; color: #00a86b; margin-bottom: 10px; }
        .promo { background: #d32f2f; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        .match-card { background: #131c2e; padding: 20px; border-radius: 15px; border-left: 5px solid #d32f2f; margin-bottom: 15px; }
        .match-title { font-weight: bold; font-size: 18px; margin-bottom: 10px; }
        .action-link { color: #00a86b; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="header">NellyTV</div>
    <div class="promo">
        <a href="WEKA_LINK_YAKO_HAPA" style="color: white; text-decoration: none;">
            <strong>🔥 OFA YA MERIDIANBET</strong><br>
            Bonus ya 150% hadi TZS 2,500,000 unapojisajili!<br>
            <span style="font-size: 0.8em; text-decoration: underline;">Jisajili SASA na weka jamvi lako 🚀</span>
        </a>
    </div>
    
    <h3>Mechi za Live Leo</h3>
    <div id="matchesList">Inapakia...</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBOYv4r1HBdmiTi lZIchXQ_w",
    authDomain: "nellytv-86294.firebaseapp.com",
    projectId: "nellytv-86294",
    databaseURL: "https://nellytv-86294-default-rtdb.firebaseio.com",
    storageBucket: "nellytv-86294.appspot.com",
    messagingSenderId: "878074217893",
    appId: "1:878074217893:web:a68721b581e6"
  };

  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);

  onValue(ref(database, 'matches'), (snapshot) => {
    const list = document.getElementById('matchesList');
    list.innerHTML = ""; 
    if(snapshot.exists()) {
        snapshot.forEach((child) => {
            const m = child.val();
            list.innerHTML += `
            <div class="match-card">
                <div class="match-title">${m.name}</div>
                <div class="action-link" onclick="alert('Ingiza password ya mechi hii!')">Ingiza Password kutazama →</div>
            </div>`;
        });
    } else {
        list.innerHTML = "<p>Hakuna mechi kwa sasa.</p>";
    }
  });
</script>
</body>
</html>
