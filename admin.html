<div class="container">
  <h2>NellyTV Admin Panel</h2>
  
  <div class="list-section">
      <h3>Zalisha Password</h3>
      <input type="number" id="validDays" value="7" placeholder="Siku">
      <button class="btn" onclick="generatePassword()">ZALISHA PASSWORD</button>
  </div>

  <div class="list-section" style="margin-top: 40px; border-top: 2px solid #00a86b; padding-top: 20px;">
      <h3>Ongeza Mechi Live</h3>
      <div class="form-group">
          <input type="text" id="matchName" placeholder="Jina la Mechi (mf: Yanga vs Simba)">
          <input type="text" id="matchLink" placeholder="Link ya Mechi (.m3u8)">
          <button class="btn" style="background: #f4a228;" onclick="addMatch()">ONGEZA MECHI</button>
      </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBOYv4r1HBdmiTi lZIchXQ_w",
    authDomain: "nellytv-86294.firebaseapp.com",
    projectId: "nellytv-86294",
    databaseURL: "https://nellytv-86294-default-rtdb.firebaseio.com",
    storageBucket: "nellytv-86294.appspot.com",
    messagingSenderId: "878074217893",
    appId: "1:878074217893:web:a68721b581e6"
  };

  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);

  // Kazi ya kuongeza mechi
  window.addMatch = function() {
      const name = document.getElementById('matchName').value;
      const link = document.getElementById('matchLink').value;
      
      if(!name || !link) { alert("Jaza vyote!"); return; }

      const newMatchRef = push(ref(database, 'matches'));
      set(newMatchRef, {
          name: name,
          link: link,
          status: "live"
      }).then(() => alert("Mechi imeongezwa NellyTV!"));
  }
</script>
